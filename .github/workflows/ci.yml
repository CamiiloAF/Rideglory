name: CI — Flutter Analyze & Test

on:
  push:
    branches: ['iter-*', 'main']
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: ['main']

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    env:
      MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}
          FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}
          # FIREBASE_IOS_API_KEY=${{ secrets.FIREBASE_IOS_API_KEY }}
          # FIREBASE_IOS_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_ANDROID_CLIENT_ID=${{ secrets.FIREBASE_ANDROID_CLIENT_ID }}
          # FIREBASE_IOS_CLIENT_ID=${{ secrets.FIREBASE_IOS_CLIENT_ID }}
          # FIREBASE_IOS_BUNDLE_ID=${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
          LOCAL_API_BASE_URL=${{ secrets.LOCAL_API_BASE_URL }}
          # UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          EOF

      - name: Create Firebase Android config
        if: env.GOOGLE_SERVICES_JSON != ''
        run: |
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      # - name: Create Firebase iOS config
      #   if: secrets.GOOGLE_SERVICE_INFO_PLIST != ''
      #   run: |
      #     mkdir -p ios/Runner
      #     echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 -d > ios/Runner/GoogleService-Info.plist

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: dart analyze

      - name: Run tests
        run: flutter test

  build-apk:
    name: Build APK (on version tag)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}
          FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}
          # FIREBASE_IOS_API_KEY=${{ secrets.FIREBASE_IOS_API_KEY }}
          # FIREBASE_IOS_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_ANDROID_CLIENT_ID=${{ secrets.FIREBASE_ANDROID_CLIENT_ID }}
          # FIREBASE_IOS_CLIENT_ID=${{ secrets.FIREBASE_IOS_CLIENT_ID }}
          # FIREBASE_IOS_BUNDLE_ID=${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
          LOCAL_API_BASE_URL=${{ secrets.LOCAL_API_BASE_URL }}
          # UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          EOF

      - name: Create Firebase Android config
        if: env.GOOGLE_SERVICES_JSON != ''
        run: |
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Decode release keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p android/keystore
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/keystore/upload-keystore.jks

      - name: Create key.properties
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          cat > android/key.properties << EOF
          storePassword=$RELEASE_KEYSTORE_PASSWORD
          keyPassword=$RELEASE_KEY_PASSWORD
          keyAlias=$RELEASE_KEY_ALIAS
          storeFile=keystore/upload-keystore.jks
          EOF

      - name: Warn if release keystore is missing
        if: env.RELEASE_KEYSTORE_BASE64 == ''
        run: |
          echo "::warning::RELEASE_KEYSTORE_BASE64 secret is not set — APK will be signed with the ephemeral debug keystore. Google Sign-In and other SHA-1-bound services will NOT work in this APK. Configure the 4 RELEASE_* secrets to sign with the real release keystore."

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rideglory-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
