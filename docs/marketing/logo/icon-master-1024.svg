<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="o" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbab56"/>
      <stop offset="0.5" stop-color="#f98c1f"/>
      <stop offset="1" stop-color="#e07510"/>
    </linearGradient>
  </defs>
  <!-- full-bleed square background (OS/stores apply the corner mask) -->
  <rect width="1024" height="1024" fill="#0D0D0F"/>

  <!-- centered R mark (translate tuned so the optical center sits at 512,512) -->
  <g transform="translate(-9,-12)">
    <!-- speed slashes tucked left of the stem -->
    <g stroke="url(#o)" stroke-width="38" stroke-linecap="round" opacity="0.45">
      <path d="M205 465 H315"/>
      <path d="M170 545 H335"/>
    </g>
    <!-- R monogram -->
    <g transform="translate(360,300) skewX(-7)" fill="none" stroke="url(#o)"
       stroke-width="120" stroke-linecap="round" stroke-linejoin="round">
      <path d="M70 0 V430"/>
      <path d="M70 10 H210 a110 110 0 0 1 0 220 H120"/>
      <path d="M150 215 L320 430"/>
    </g>
  </g>
</svg>
