<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOAT — Success Confirmation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <style>
    :root {
      --color-bg:           #0D0D0D;
      --color-surface:      #111111;
      --color-border:       rgba(255,255,255,0.12);
      --color-primary:      #f98c1f;
      --color-on-primary:   #0D0D0D;
      --color-on-surface:   #FFFFFF;
      --color-on-surface-variant: rgba(255,255,255,0.6);
      --color-success:      #34c77b;
      --color-success-bg:   #0d2b1a;
      --font-family:        'Space Grotesk', sans-serif;
      --radius-md:          8px;
      --radius-lg:          12px;
      --radius-full:        100px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 16px; font-family: var(--font-family);
      color: var(--color-on-surface);
    }

    .device {
      width: 375px; height: 812px;
      background: var(--color-bg); border-radius: 40px;
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    }

    .status-bar {
      height: 44px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 24px; background: var(--color-bg);
    }
    .status-bar .time { font-size: 15px; font-weight: 600; }
    .status-bar .icons { display: flex; gap: 6px; align-items: center; }

    .app-bar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px; background: var(--color-bg); gap: 8px;
    }
    .close-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--color-on-surface); }

    /* Body */
    .body-center {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 32px 32px 32px;
      gap: 24px; overflow-y: auto;
    }

    /* Success icon */
    .success-circle {
      width: 96px; height: 96px; border-radius: 50%;
      background: var(--color-success-bg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .success-circle .material-symbols-rounded {
      font-size: 56px; color: var(--color-success);
    }

    .success-title {
      font-size: 22px; font-weight: 700; color: var(--color-on-surface);
      text-align: center; line-height: 1.3;
    }
    .success-subtitle {
      font-size: 14px; color: var(--color-on-surface-variant);
      text-align: center; line-height: 1.6;
    }

    /* Summary card */
    .summary-card {
      width: 100%;
      background: var(--color-surface); border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .summary-row {
      display: flex; align-items: center;
    }
    .summary-label { font-size: 13px; color: var(--color-on-surface-variant); flex: 1; }
    .summary-value { font-size: 13px; font-weight: 600; color: var(--color-on-surface); }
    .summary-divider { height: 1px; background: var(--color-border); }

    /* SOAT valid badge */
    .soat-valid-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: var(--radius-full);
      background: var(--color-success-bg);
    }
    .soat-valid-badge .material-symbols-rounded { font-size: 18px; color: var(--color-success); }
    .soat-valid-badge span { font-size: 14px; font-weight: 600; color: var(--color-success); }

    /* Done button */
    .btn-done {
      display: flex; align-items: center; justify-content: center;
      height: 52px; border-radius: var(--radius-md); width: 100%;
      background: var(--color-primary); color: var(--color-on-primary);
      font-family: var(--font-family); font-weight: 600; font-size: 15px;
      border: none; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="device">
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">
        <span class="material-symbols-rounded" style="font-size:16px">signal_cellular_alt</span>
        <span class="material-symbols-rounded" style="font-size:16px">wifi</span>
        <span class="material-symbols-rounded" style="font-size:16px">battery_full</span>
      </span>
    </div>
    <div class="app-bar">
      <div class="close-btn"><span class="material-symbols-rounded">close</span></div>
    </div>

    <div class="body-center">
      <!-- Success icon -->
      <div class="success-circle">
        <span class="material-symbols-rounded">check_circle</span>
      </div>

      <div class="success-title">SOAT registrado exitosamente</div>
      <div class="success-subtitle">
        La información de tu póliza ha sido guardada. Te notificaremos antes de que venza.
      </div>

      <!-- Summary data -->
      <div class="summary-card">
        <div class="summary-row">
          <span class="summary-label">Fecha de vencimiento</span>
          <span class="summary-value">15 mar 2026</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-row">
          <span class="summary-label">Aseguradora</span>
          <span class="summary-value">Sura</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-row">
          <span class="summary-label">Número de póliza</span>
          <span class="summary-value">SOAT-2024-1234567</span>
        </div>
      </div>

      <!-- Valid SOAT badge -->
      <div class="soat-valid-badge">
        <span class="material-symbols-rounded">shield</span>
        <span>SOAT vigente</span>
      </div>

      <button class="btn-done">Listo</button>
    </div>
  </div>

</body>
</html>
