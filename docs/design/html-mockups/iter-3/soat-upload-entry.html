<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOAT — Upload Entry (File Picker)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <style>
    :root {
      --color-bg:           #0D0D0D;
      --color-surface:      #111111;
      --color-border:       rgba(255,255,255,0.12);
      --color-primary:      #f98c1f;
      --color-on-primary:   #0D0D0D;
      --color-on-surface:   #FFFFFF;
      --color-on-surface-variant: rgba(255,255,255,0.6);
      --color-success:      #34c77b;
      --font-family:        'Space Grotesk', sans-serif;
      --radius-md:          8px;
      --radius-lg:          12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 16px; font-family: var(--font-family);
      color: var(--color-on-surface); gap: 24px;
    }

    .device {
      width: 375px; height: 812px;
      background: var(--color-bg); border-radius: 40px;
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7); position: relative;
    }

    .status-bar {
      height: 44px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 24px; background: var(--color-bg);
    }
    .status-bar .time { font-size: 15px; font-weight: 600; }
    .status-bar .icons { display: flex; gap: 6px; align-items: center; }

    .app-bar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px; background: var(--color-bg); gap: 8px;
    }
    .back-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--color-on-surface); }
    .app-title { font-size: 18px; font-weight: 600; color: var(--color-on-surface); flex: 1; }

    /* dim overlay — simulates background screen behind bottom sheet */
    .dim-overlay {
      flex: 1;
      background: rgba(0,0,0,0.6);
      position: relative;
    }

    /* ============ BOTTOM SHEET ============ */
    .bottom-sheet {
      background: var(--color-surface);
      border-radius: 16px 16px 0 0;
      padding: 8px 0 0;
      flex-shrink: 0;
    }
    .sheet-handle {
      display: flex; justify-content: center; align-items: center; height: 24px;
    }
    .handle-bar {
      width: 40px; height: 4px; border-radius: 2px; background: var(--color-border);
    }
    .sheet-content {
      padding: 0 24px 32px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .sheet-title {
      font-size: 20px; font-weight: 700; color: var(--color-on-surface);
    }
    .sheet-subtitle {
      font-size: 14px; color: var(--color-on-surface-variant);
      line-height: 1.5;
    }

    /* Current SOAT card */
    .soat-file-card {
      display: flex; align-items: center; gap: 12px;
      padding: 16px; border-radius: var(--radius-md);
      background: #1a1a1a; border: 1px solid var(--color-border);
    }
    .soat-file-card .file-icon { font-size: 32px; color: var(--color-primary); flex-shrink: 0; }
    .file-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .file-name { font-size: 14px; font-weight: 600; color: var(--color-on-surface); }
    .file-meta { font-size: 12px; color: var(--color-on-surface-variant); }
    .check-icon { font-size: 20px; color: var(--color-success); }

    /* Buttons */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: var(--radius-md); font-family: var(--font-family);
      font-weight: 600; font-size: 15px; cursor: pointer; border: none;
      width: 100%;
    }
    .btn-primary { background: var(--color-primary); color: var(--color-on-primary); height: 52px; }
    .btn-outline {
      background: transparent; color: var(--color-on-surface);
      border: 1px solid var(--color-border); height: 44px;
    }
    .btn .material-symbols-rounded { font-size: 20px; }
  </style>
</head>
<body>

  <div class="device">
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">
        <span class="material-symbols-rounded" style="font-size:16px">signal_cellular_alt</span>
        <span class="material-symbols-rounded" style="font-size:16px">wifi</span>
        <span class="material-symbols-rounded" style="font-size:16px">battery_full</span>
      </span>
    </div>
    <div class="app-bar">
      <div class="back-btn"><span class="material-symbols-rounded">arrow_back</span></div>
      <span class="app-title">Mi garaje</span>
    </div>

    <!-- Dimmed background (shows the vehicle detail screen behind) -->
    <div class="dim-overlay"></div>

    <!-- Bottom sheet -->
    <div class="bottom-sheet">
      <div class="sheet-handle"><div class="handle-bar"></div></div>
      <div class="sheet-content">
        <div class="sheet-title">Subir SOAT</div>
        <div class="sheet-subtitle">
          Sube el PDF de tu póliza SOAT para registrar la fecha de vencimiento automáticamente.
        </div>

        <!-- Current SOAT file (already uploaded) -->
        <div class="soat-file-card">
          <span class="material-symbols-rounded file-icon">picture_as_pdf</span>
          <div class="file-info">
            <div class="file-name">SOAT_2024.pdf</div>
            <div class="file-meta">Vence: 15 Mar 2025 &nbsp;•&nbsp; 1.2 MB</div>
          </div>
          <span class="material-symbols-rounded check-icon">check_circle</span>
        </div>

        <button class="btn btn-primary">
          <span class="material-symbols-rounded">upload_file</span>
          Seleccionar PDF
        </button>

        <button class="btn btn-outline">
          Ingresar manualmente
        </button>
      </div>
    </div>
  </div>

</body>
</html>
