<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOAT — Manual Entry Fallback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <style>
    :root {
      --color-bg:           #0D0D0D;
      --color-surface:      #111111;
      --color-border:       rgba(255,255,255,0.12);
      --color-primary:      #f98c1f;
      --color-on-primary:   #0D0D0D;
      --color-on-surface:   #FFFFFF;
      --color-on-surface-variant: rgba(255,255,255,0.6);
      --font-family:        'Space Grotesk', sans-serif;
      --radius-md:          8px;
      --radius-lg:          12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 16px; font-family: var(--font-family);
      color: var(--color-on-surface);
    }

    .device {
      width: 375px; height: 812px;
      background: var(--color-bg); border-radius: 40px;
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    }

    .status-bar {
      height: 44px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 24px; background: var(--color-bg);
    }
    .status-bar .time { font-size: 15px; font-weight: 600; }
    .status-bar .icons { display: flex; gap: 6px; align-items: center; }

    .app-bar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px; background: var(--color-bg); gap: 8px;
    }
    .back-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--color-on-surface); }
    .app-title { font-size: 18px; font-weight: 600; color: var(--color-on-surface); flex: 1; }

    .scroll-area {
      flex: 1; overflow-y: auto; scrollbar-width: none;
      padding: 16px 20px 32px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* Headings */
    .page-heading { font-size: 18px; font-weight: 700; color: var(--color-on-surface); }
    .page-subheading { font-size: 14px; color: var(--color-on-surface-variant); line-height: 1.5; }

    /* Form fields */
    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-label {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--color-on-surface-variant);
    }
    .field-input {
      height: 52px; display: flex; align-items: center; gap: 8px;
      padding: 0 16px; border-radius: var(--radius-md);
      background: var(--color-surface); border: 1px solid var(--color-border);
    }
    .field-placeholder { font-size: 15px; color: var(--color-on-surface-variant); font-family: var(--font-family); }
    .field-spacer { flex: 1; }
    .field-icon { font-size: 20px; color: var(--color-on-surface-variant); }

    /* Button */
    .btn-primary {
      display: flex; align-items: center; justify-content: center;
      height: 52px; border-radius: var(--radius-md);
      background: var(--color-primary); color: var(--color-on-primary);
      font-family: var(--font-family); font-weight: 600; font-size: 15px;
      border: none; cursor: pointer; width: 100%;
    }
  </style>
</head>
<body>

  <div class="device">
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">
        <span class="material-symbols-rounded" style="font-size:16px">signal_cellular_alt</span>
        <span class="material-symbols-rounded" style="font-size:16px">wifi</span>
        <span class="material-symbols-rounded" style="font-size:16px">battery_full</span>
      </span>
    </div>
    <div class="app-bar">
      <div class="back-btn"><span class="material-symbols-rounded">arrow_back</span></div>
      <span class="app-title">Registrar SOAT</span>
    </div>

    <div class="scroll-area">
      <div class="page-heading">Ingresa los datos manualmente</div>
      <div class="page-subheading">
        Completa los campos con la información de tu póliza SOAT.
      </div>

      <!-- Field: Fecha de vencimiento -->
      <div class="field-group">
        <div class="field-label">Fecha de vencimiento</div>
        <div class="field-input">
          <span class="field-placeholder">dd/mm/aaaa</span>
          <div class="field-spacer"></div>
          <span class="material-symbols-rounded field-icon">calendar_today</span>
        </div>
      </div>

      <!-- Field: Número de póliza -->
      <div class="field-group">
        <div class="field-label">Número de póliza</div>
        <div class="field-input">
          <span class="field-placeholder">Ej: SOAT-2025-0001234</span>
        </div>
      </div>

      <!-- Field: Aseguradora -->
      <div class="field-group">
        <div class="field-label">Aseguradora</div>
        <div class="field-input">
          <span class="field-placeholder">Ej: Sura, Bolívar, AXA...</span>
        </div>
      </div>

      <button class="btn-primary">Guardar</button>
    </div>
  </div>

</body>
</html>
