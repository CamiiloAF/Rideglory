<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .profile-header-shimmer {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 0 24px;
    }
    .shimmer-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .w-60 { width: 60%; }
    .w-80 { width: 80%; }
    .w-40 { width: 40%; }
    .w-100 { width: 100%; }
  </style>
</head>
<body>
  <div class="device">
    <!-- Status bar -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="icons">
        <span>●●●</span>
        <span>WiFi</span>
        <span>🔋</span>
      </div>
    </div>

    <!-- App bar -->
    <div class="app-bar">
      <span class="title">Mi perfil</span>
    </div>

    <!-- Screen content -->
    <div class="screen-content">
      <div class="scroll-area">

        <!-- Header shimmer: avatar + name + email -->
        <div class="profile-header-shimmer">
          <div class="shimmer shimmer-circle" style="width:80px;height:80px;"></div>
          <div class="shimmer-row">
            <div class="shimmer shimmer-text-lg w-80"></div>
            <div class="shimmer shimmer-text-md w-60"></div>
          </div>
        </div>

        <div class="divider" style="margin-top:0;"></div>
        <div class="spacer-md"></div>

        <!-- Vehicle card shimmer -->
        <div class="shimmer shimmer-text-sm w-40" style="margin-bottom:8px;"></div>
        <div class="shimmer shimmer-block w-100" style="border-radius:12px;"></div>

        <div class="spacer-xl"></div>

        <!-- Actions shimmer -->
        <div class="shimmer shimmer-text-sm w-40" style="margin-bottom:12px;"></div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div class="shimmer" style="height:44px;width:100%;border-radius:8px;"></div>
          <div class="shimmer" style="height:44px;width:100%;border-radius:8px;"></div>
        </div>

      </div>
    </div>

    <!-- Bottom nav -->
    <div class="bottom-nav">
      <div class="nav-item">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Inicio</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Eventos</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">🏍️</span>
        <span class="nav-label">Garaje</span>
      </div>
      <div class="nav-item active">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Perfil</span>
      </div>
    </div>
  </div>

  <!-- State label -->
  <div style="margin-top:16px;font-family:'Space Grotesk',sans-serif;color:#9E9E9E;font-size:13px;text-align:center;">
    Estado: <strong style="color:#f98c1f;">loading</strong> — shimmer skeleton
  </div>
</body>
</html>
